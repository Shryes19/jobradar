services:
  - type: web
    name: jobradar-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobradar-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: APIFY_API_KEY
        sync: false
    autoDeploy: true

databases:
  - name: jobradar-db
    databaseName: jobradar
    user: jobradar
    plan: free
